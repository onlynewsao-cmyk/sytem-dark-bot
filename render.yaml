services:
  - type: web
    name: sytem-dark-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PREFIX
        value: .
      - key: BOT_NAME
        value: Sytem DARK
      - key: OWNER_NAME
        value: Dark Net
      - key: OWNER_NUMBER
        value: 244945280380
      - key: BOT_NUMBER
        value: 244945280380
      - key: AUTH_DIR
        value: ./dono/sytem-dark-session
